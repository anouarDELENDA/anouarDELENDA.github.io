baseURL = 'http://https://github.com/anouarDELENDA/anouarDELENDA.github.io/'
title = "A.K.A λ"
copyright = "Anouar Akacha DELENDA"
theme = "tailwind"
languageCode = "en-us"
defaultContentLanguage = "en"
enableRobotsTXT = true

# Pagination
[pagination]
  paginatePath = "page"
  paginate = 10

[module]
  [[module.imports]]
    path = "github.com/tomowang/hugo-theme-tailwind"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

  [markup.tableOfContents]
    endLevel = 10
    ordered = true
    startLevel = 1


[outputs]
  home = ["HTML", "RSS", "JSON"]

# ALL params in one single block
[params]
  # flat hey are allways first !
  math = true

  showAuthor = true    
  description = "A short bio shown on the home page"

  [params.header]
    logo  = "/images/logo.png"
    title = ""

  [params.footer]
    since     = 2026
    poweredby = true

  [params.Author]
    name = 'Anouar Akacha Delenda'     
  
[[menus.main]]
  name   = "Home"
  url    = "/"
  weight = 1

[[menus.main]]
  name   = "Publications"
  url    = "/publications/"
  weight = 2

[[menus.main]]
  name   = "Portfolio"
  url    = "/portfolio/"
  weight = 3

[[menus.main]]
  name   = "Blogs"
  url    = "/blogs/"
  weight = 4


# social_media

[params.social_media]
  [[params.social_media.items]]
    enabled = true
    title   = "Github"
    icon    = "brand-github"
    link    = "https://github.com/anouarDELENDA"

  [[params.social_media.items]]
    enabled = true
    title   = "LinkedIn"
    icon    = "brand-linkedin"
    link    = "https://linkedin.com/in/anouar-akacha-delenda-0602061b1"

  [[params.social_media.items]]
    enabled = true
    title   = "X"
    icon    = "brand-x"
    link    = "https://x.com/AnouarAkacha"

  [[params.social_media.items]]
    enabled = true
    title   = "Orcid"
    icon    = "orcid"
    link    = "https://orcid.org/0009-0006-1349-0477"
  [[params.social_media.items]]
    enabled = true
    title   = "ResearchGate"
    icon    = "researchgate"
    link    = "https://www.researchgate.net/profile/Anouar-Akacha-Delenda-2?ev=hdr_xprf"

[taxonomies]
  category = "categories"
  tag = "tags"

